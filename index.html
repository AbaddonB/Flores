<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un detalle para ti</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #05010a, #0e0314, #1a0624); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .garden {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        /* Contenedor de cada flor, posicionado de forma absoluta para llenar la pantalla */
        .flower-container {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }

        /* Animación del tallo creciendo */
        .stem {
            width: 5px;
            background: linear-gradient(to right, #1e3d1a, #32632b, #1e3d1a);
            border-radius: 4px;
            filter: drop-shadow(0 0 3px rgba(50, 99, 43, 0.8));
            height: 0; /* Empieza en 0 para la animación */
            animation: growStem 2.5s ease-out forwards;
        }

        @keyframes growStem {
            100% { height: var(--stem-h); }
        }

        /* Animación de la flor abriéndose (Florecer) */
        .flower-svg {
            position: absolute;
            bottom: 100%;
            width: 100px;
            height: 100px;
            overflow: visible;
            transform-origin: bottom center;
            transform: scale(0); /* Empieza pequeña/invisible */
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(204, 102, 255, 0.6)) drop-shadow(0 0 15px rgba(128, 0, 128, 0.8));
            animation: bloom 1.5s ease-out forwards;
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes sway {
            0% { transform: rotate(-4deg); }
            100% { transform: rotate(4deg); }
        }
