<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades, Dra. Daphne!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #030008, #0a0112, #14031d); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .bouquet-container {
            position: absolute;
            bottom: -30px; 
            left: 50%;
            display: flex;
            justify-content: center;
            z-index: 10;
            /* Punto de anclaje para el escalado responsivo */
            transform-origin: bottom center;
        }

        .flower-wrapper {
            position: absolute;
            bottom: 0;
            left: -2.5px; 
            transform-origin: bottom center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: sway 4s ease-in-out infinite alternate;
        }

        @keyframes sway {
            0% { transform: rotate(calc(var(--base-angle) - 2.5deg)); }
            100% { transform: rotate(calc(var(--base-angle) + 2.5deg)); }
        }

        .stem {
            width: 5px;
            background: linear-gradient(to top, #081706, #1b3d16, #2d6325);
            border-radius: 4px;
            height: 0;
            filter: drop-shadow(0 0 4px rgba(45, 99, 37, 0.5));
            animation: growStem 2.5s ease-out forwards;
            animation-delay: var(--delay);
        }

        @keyframes growStem {
            100% { height: var(--stem-h); }
        }

        .flower-svg {
            position: absolute;
            bottom: 100%;
            margin-bottom: -50px; 
            opacity: 0;
            transform-origin: center center;
            transform: scale(0);
            filter: drop-shadow(0 0 8px rgba(204, 102, 255, 0.6)) drop-shadow(0 0 15px rgba(128, 0, 128, 0.8));
            animation: bloom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: calc(var(--delay) + 1.8s);
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(calc(var(--base-angle) * -0.4)); opacity: 0; }
            100% { transform: scale(1) rotate(calc(var(--base-angle) * -0.4)); opacity: 1; }
        }

        .message-bubble {
            position: absolute;
            background: rgba(20, 4, 28, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #da70d6;
            box-shadow: 0 0 12px rgba(218, 112, 214, 0.4);
            color: #f8f0ff;
            padding: 12px 20px;
            border-radius: 25px;
            /* Tamaño de fuente responsivo para celulares */
            font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 500;
            text-align: center;
            max-width: 85vw; /* Evita que los mensajes muy largos se salgan de la pantalla */
            opacity: 0;
            z-index: 100; 
            pointer-events: none;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { bottom: -20px; opacity: 0; transform: translateY(0) scale(0.8); }
            10% { opacity: 1; transform: translateY(-30px) scale(1); }
            85% { opacity: 1; }
            100% { bottom: 100vh; opacity: 0; transform: translateY(-50px) scale(0.9); }
        }
    </style>
</head>
<body>

    <div id="messages-container"></div>

    <div class="bouquet-container" id="bouquet">
        
        <!-- CAPA FONDO (Altas) -->
        <div class="flower-wrapper" style="--base-angle: -35deg; --stem-h: 300px; --delay: 0.2s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 100px; height: 100px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 35deg; --stem-h: 280px; --delay: 0.4s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 90px; height: 90px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 0deg; --stem-h: 460px; --delay: 0.8s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 140px; height: 140px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <!-- CAPA MEDIA -->
        <div class="flower-wrapper" style="--base-angle: -20deg; --stem-h: 380px; --delay: 1.0s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 120px; height: 120px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 20deg; --stem-h: 360px; --delay: 0.5s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 110px; height: 110px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: -10deg; --stem-h: 390px; --delay: 1.2s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg rose-svg" style="width: 130px; height: 130px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 10deg; --stem-h: 370px; --delay: 0.7s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg rose-svg" style="width: 125px; height: 125px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: -42deg; --stem-h: 200px; --delay: 0.3s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg rose-svg" style="width: 85px; height: 85px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 42deg; --stem-h: 190px; --delay: 0.9s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 90px; height: 90px;"></svg>
        </div>

        <!-- CAPA FRONTAL (Flores de relleno en medio) -->
        <div class="flower-wrapper" style="--base-angle: -28deg; --stem-h: 270px; --delay: 1.1s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg rose-svg" style="width: 95px; height: 95px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 28deg; --stem-h: 250px; --delay: 0.6s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 105px; height: 105px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 0deg; --stem-h: 240px; --delay: 1.3s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 85px; height: 85px;"></svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: -12deg; --stem-h: 210px; --delay: 0.5s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 80px; height: 80px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-15 15,-35 0,-45 C-15,-35 -15,-15 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <div class="flower-wrapper" style="--base-angle: 15deg; --stem-h: 200px; --delay: 1.4s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg rose-svg" style="width: 75px; height: 75px;"></svg>
        </div>

    </div>

    <script>
        // --- ESCALADO RESPONSIVO ---
        // Calcula la escala adecuada dependiendo del ancho y alto de la pantalla
        function resizeBouquet() {
            const bouquet = document.getElementById('bouquet');
            // Medidas base (pantallas grandes)
            const scaleX = window.innerWidth / 750;
            const scaleY = window.innerHeight / 750;
            // Toma el valor más pequeño para asegurar que no se corte por ningún lado, con un máximo de escala de 1
            const scale = Math.min(1, scaleX, scaleY);
            bouquet.style.transform = `scale(${scale})`;
        }

        // Ejecutar al inicio y cada vez que cambie el tamaño de la ventana (o rote el celular)
        window.addEventListener('resize', resizeBouquet);
        resizeBouquet();


        // --- GENERACIÓN DE FLORES ---
        const dahlias = document.querySelectorAll('.dahlia-svg');
        dahlias.forEach(dahlia => {
            let dahliaHTML = '<g transform="translate(50,50)">';
            for(let i=0; i<16; i++) { dahliaHTML += `<path d="M0,0 L7,-25 L0,-42 L-7,-25 Z" fill="#4a148c" transform="rotate(${i * 22.5})"/>`; }
            for(let i=0; i<12; i++) { dahliaHTML += `<path d="M0,0 L6,-20 L0,-35 L-6,-20 Z" fill="#7b1fa2" transform="rotate(${i * 30 + 15})"/>`; }
            for(let i=0; i<10; i++) { dahliaHTML += `<path d="M0,0 L5,-15 L0,-25 L-5,-15 Z" fill="#ab47bc" transform="rotate(${i * 36})"/>`; }
            for(let i=0; i<8; i++) { dahliaHTML += `<path d="M0,0 L3,-8 L0,-15 L-3,-8 Z" fill="#e1bee7" transform="rotate(${i * 45 + 20})"/>`; }
            dahliaHTML += '<circle cx="0" cy="0" r="5" fill="#ffeb3b"/></g>';
            dahlia.innerHTML = dahliaHTML;
        });

        const roses = document.querySelectorAll('.rose-svg');
        roses.forEach(rose => {
            rose.innerHTML = `
                <path d="M50,50 Q30,35 35,65 Q50,55 50,50" fill="#2d5a27"/>
                <path d="M50,50 Q70,35 65,65 Q50,55 50,50" fill="#2d5a27"/>
                <circle cx="50" cy="50" r="28" fill="#3a062e"/>
                <circle cx="50" cy="32" r="15" fill="#5c0a46"/>
                <circle cx="66" cy="59" r="15" fill="#5c0a46"/>
                <circle cx="34" cy="59" r="15" fill="#5c0a46"/>
                <circle cx="59" cy="39" r="12" fill="#8a1068"/>
                <circle cx="41" cy="39" r="12" fill="#8a1068"/>
                <circle cx="50" cy="62" r="12" fill="#8a1068"/>
                <circle cx="50" cy="46" r="8" fill="#c71c9e"/>
                <circle cx="56" cy="53" r="8" fill="#c71c9e"/>
                <circle cx="44" cy="53" r="8" fill="#c71c9e"/>
                <circle cx="50" cy="50" r="4" fill="#ffb3e6"/>
            `;
        });


        // --- SISTEMA INTELIGENTE DE MENSAJES (No Repeticiones) ---
        const allMessages = [
            "Eres tan linda como inteligente. ¡Felicidades, Daphne!",
            "La medicina acaba de ganar a una doctora maravillosa.",
            "Con esa bata y tu inteligencia, te ves espectacular.",
            "Esa sonrisa te queda maravillosa, Daphne.",
            "Belleza e inteligencia en una sola doctora.",
            "Me encanta lo lista y dedicada que eres.",
            "Felicidades, Dra. Daphne. Tienes una mente brillante.",
            "Eres una mujer increíble, de verdad.",
            "Felicidades por este gran paso, guapa.",
            "Con tu inteligencia y esa sonrisa, conquistas todo, Daphne."
        ];

        let availableMessages = [...allMessages]; // Bolsa de mensajes disponibles
        const container = document.getElementById('messages-container');

        function spawnMessage() {
            // Si ya salieron todos los mensajes, vuelve a llenar la bolsa
            if (availableMessages.length === 0) {
                availableMessages = [...allMessages];
            }

            // Elegir uno aleatorio de los que quedan en la bolsa
            const randomIndex = Math.floor(Math.random() * availableMessages.length);
            // Extraer el mensaje elegido de la bolsa para que no se repita
            const selectedText = availableMessages.splice(randomIndex, 1)[0];

            const msgElement = document.createElement('div');
            msgElement.className = 'message-bubble';
            msgElement.innerText = selectedText;
            
            // Posicionamiento más seguro para que no se salga de los bordes laterales
            const randomX = Math.floor(Math.random() * 50) + 5; 
            msgElement.style.left = `${randomX}%`;
            
            const duration = Math.floor(Math.random() * 6) + 12;
            msgElement.style.animationDuration = `${duration}s`;

            container.appendChild(msgElement);

            setTimeout(() => {
                msgElement.remove();
            }, duration * 1000);
        }

        setTimeout(() => {
            spawnMessage();
            setInterval(spawnMessage, 4500);
        }, 4000);
    </script>
</body>
</html>
