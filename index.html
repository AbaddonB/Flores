<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades, Doctora!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #05010a, #0e0314, #1a0624); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .garden {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        .flower-container {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }

        .stem {
            width: 5px;
            background: linear-gradient(to right, #1e3d1a, #32632b, #1e3d1a);
            border-radius: 4px;
            filter: drop-shadow(0 0 3px rgba(50, 99, 43, 0.8));
            height: 0; 
            animation: growStem 2.5s ease-out forwards;
        }

        @keyframes growStem {
            100% { height: var(--stem-h); }
        }

        .flower-svg {
            position: absolute;
            bottom: 100%;
            width: 100px;
            height: 100px;
            overflow: visible;
            transform-origin: bottom center;
            transform: scale(0); 
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(204, 102, 255, 0.6)) drop-shadow(0 0 15px rgba(128, 0, 128, 0.8));
            animation: bloom 1.5s ease-out forwards;
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes sway {
            0% { transform: rotate(-4deg); }
            100% { transform: rotate(4deg); }
        }

        .message-bubble {
            position: absolute;
            background: rgba(26, 6, 36, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #da70d6;
            box-shadow: 0 0 10px rgba(218, 112, 214, 0.5);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            z-index: 5;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { bottom: -50px; opacity: 0; transform: translateY(0) scale(0.8); }
            10% { opacity: 1; transform: translateY(-30px) scale(1); }
            90% { opacity: 1; }
            100% { bottom: 100vh; opacity: 0; transform: translateY(-100px) scale(0.9); }
        }
    </style>
</head>
<body>

    <div id="messages-container"></div>

    <div class="garden">
        
        <!-- Grupo 1: Izquierda -->
        <div class="flower-container" style="left: 5%; animation-delay: 0.2s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.2s;">
                <path d="M50,80 Q35,65 40,95 Q50,85 50,80" fill="#45883c"/>
                <circle cx="50" cy="45" r="28" fill="#3a062e"/>
                <circle cx="40" cy="40" r="22" fill="#661050"/>
                <circle cx="60" cy="40" r="22" fill="#661050"/>
                <circle cx="50" cy="30" r="18" fill="#941374"/>
                <circle cx="50" cy="35" r="12" fill="#c71c9e"/>
                <circle cx="50" cy="35" r="5" fill="#ffb3e6"/>
            </svg>
            <div class="stem" style="--stem-h: 150px; animation-delay: 0.2s;"></div>
        </div>

        <div class="flower-container" style="left: 13%; animation-delay: 0.7s;">
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="animation-delay: 2.5s;"></svg>
            <div class="stem" style="--stem-h: 220px; animation-delay: 0.7s;"></div>
        </div>

        <div class="flower-container" style="left: 22%; animation-delay: 0.4s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.0s;">
                <g transform="translate(50,45)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <line x1="0" y1="0" x2="-10" y2="-20" stroke="#ffeb3b" stroke-width="2"/>
                    <line x1="0" y1="0" x2="10" y2="-20" stroke="#ffeb3b" stroke-width="2"/>
                    <circle cx="-10" cy="-20" r="3" fill="#ffb300"/>
                    <circle cx="10" cy="-20" r="3" fill="#ffb300"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
            <div class="stem" style="--stem-h: 280px; animation-delay: 0.4s;"></div>
        </div>

        <!-- Grupo 2: Centro-Izquierda -->
        <div class="flower-container" style="left: 32%; animation-delay: 0.9s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.7s;">
                <circle cx="50" cy="45" r="25" fill="#4a0e3b"/>
                <circle cx="43" cy="40" r="20" fill="#75155c"/>
                <circle cx="57" cy="40" r="20" fill="#75155c"/>
                <circle cx="50" cy="30" r="16" fill="#a31e81"/>
                <circle cx="50" cy="35" r="10" fill="#d428a8"/>
            </svg>
            <div class="stem" style="--stem-h: 180px; animation-delay: 0.9s;"></div>
        </div>

        <div class="flower-container" style="left: 41%; animation-delay: 0.1s;">
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="animation-delay: 1.8s;"></svg>
            <div class="stem" style="--stem-h: 130px; animation-delay: 0.1s;"></div>
        </div>

        <div class="flower-container" style="left: 50%; animation-delay: 0.6s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.4s;">
                <g transform="translate(50,45)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
            <div class="stem" style="--stem-h: 250px; animation-delay: 0.6s;"></div>
        </div>

        <!-- Grupo 3: Centro-Derecha -->
        <div class="flower-container" style="left: 59%; animation-delay: 0.8s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.6s;">
                <circle cx="50" cy="45" r="28" fill="#3a062e"/>
                <circle cx="40" cy="40" r="22" fill="#661050"/>
                <circle cx="60" cy="40" r="22" fill="#661050"/>
                <circle cx="50" cy="30" r="18" fill="#941374"/>
                <circle cx="50" cy="35" r="12" fill="#c71c9e"/>
            </svg>
            <div class="stem" style="--stem-h: 210px; animation-delay: 0.8s;"></div>
        </div>

        <div class="flower-container" style="left: 68%; animation-delay: 0.3s;">
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="animation-delay: 2.1s;"></svg>
            <div class="stem" style="--stem-h: 160px; animation-delay: 0.3s;"></div>
        </div>

        <div class="flower-container" style="left: 77%; animation-delay: 1.0s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.9s;">
                <g transform="translate(50,45)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
            <div class="stem" style="--stem-h: 240px; animation-delay: 1.0s;"></div>
        </div>

        <!-- Grupo 4: Derecha -->
        <div class="flower-container" style="left: 85%; animation-delay: 0.5s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 2.3s;">
                <path d="M50,80 Q65,65 60,95 Q50,85 50,80" fill="#45883c"/>
                <circle cx="50" cy="45" r="25" fill="#4a0e3b"/>
                <circle cx="43" cy="40" r="20" fill="#75155c"/>
                <circle cx="57" cy="40" r="20" fill="#75155c"/>
                <circle cx="50" cy="30" r="16" fill="#a31e81"/>
                <circle cx="50" cy="35" r="10" fill="#d428a8"/>
            </svg>
            <div class="stem" style="--stem-h: 190px; animation-delay: 0.5s;"></div>
        </div>

        <div class="flower-container" style="left: 93%; animation-delay: 1.1s;">
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="animation-delay: 3.0s;"></svg>
            <div class="stem" style="--stem-h: 140px; animation-delay: 1.1s;"></div>
        </div>

        <div class="flower-container" style="left: 97%; animation-delay: 0.2s;">
            <svg viewBox="0 0 100 100" class="flower-svg" style="animation-delay: 1.9s;">
                <g transform="translate(50,45)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
            <div class="stem" style="--stem-h: 270px; animation-delay: 0.2s;"></div>
        </div>

    </div>

    <script>
        const dahlias = document.querySelectorAll('.dahlia-svg');
        dahlias.forEach(dahlia => {
            let dahliaHTML = '<g transform="translate(50,45)">';
            for(let i=0; i<16; i++) { dahliaHTML += `<path d="M0,0 L7,-25 L0,-42 L-7,-25 Z" fill="#4a148c" transform="rotate(${i * 22.5})"/>`; }
            for(let i=0; i<12; i++) { dahliaHTML += `<path d="M0,0 L6,-20 L0,-35 L-6,-20 Z" fill="#7b1fa2" transform="rotate(${i * 30 + 15})"/>`; }
            for(let i=0; i<10; i++) { dahliaHTML += `<path d="M0,0 L5,-15 L0,-25 L-5,-15 Z" fill="#ab47bc" transform="rotate(${i * 36})"/>`; }
            for(let i=0; i<8; i++) { dahliaHTML += `<path d="M0,0 L3,-8 L0,-15 L-3,-8 Z" fill="#e1bee7" transform="rotate(${i * 45 + 20})"/>`; }
            dahliaHTML += '<circle cx="0" cy="0" r="5" fill="#ffeb3b"/></g>';
            dahlia.innerHTML = dahliaHTML;
        });

        // --- MENSAJES DE GRADUACIÓN, FUERZA Y COQUETEO ---
        const messages = [
            "¡Felicidades por tu logro! Todo tu esfuerzo rindió frutos.",
            "Eres alguien increíblemente fuerte e inspiradora.",
            "La medicina acaba de ganar a una doctora maravillosa.",
            "Tantas desveladas por fin valieron la pena. ¡Lo lograste!",
            "Con esa bata y tu inteligencia, te ves espectacular.",
            "Admiro tu dedicación, eres una mujer imparable.",
            "Qué orgullo verte alcanzar este sueño.",
            "Eres súper lista, no había duda de que lo ibas a lograr.",
            "Felicidades, doc. Tu pasión es de las cosas que más admiro de ti.",
            "Mucho éxito en todo lo que viene, te lo mereces."
        ];

        const container = document.getElementById('messages-container');

        function spawnMessage() {
            const msgElement = document.createElement('div');
            msgElement.className = 'message-bubble';
            msgElement.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            const randomX = Math.floor(Math.random() * 60) + 15;
            msgElement.style.left = `${randomX}%`;
            
            const duration = Math.floor(Math.random() * 6) + 10;
            msgElement.style.animationDuration = `${duration}s`;

            container.appendChild(msgElement);

            setTimeout(() => {
                msgElement.remove();
            }, duration * 1000);
        }

        setTimeout(() => {
            spawnMessage();
            setInterval(spawnMessage, 4000);
        }, 3500);
    </script>
</body>
</html>
