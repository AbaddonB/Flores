<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades, Doctora!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #030008, #0a0112, #14031d); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor central del ramo */
        .bouquet-container {
            position: absolute;
            bottom: -30px; /* Oculta la base de los tallos fuera de la pantalla */
            left: 50%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        /* Cada flor individual con su ángulo de inclinación */
        .flower-wrapper {
            position: absolute;
            bottom: 0;
            left: -2.5px; /* Centra el tallo de 5px */
            transform-origin: bottom center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* El balanceo respeta el ángulo base del ramo */
            animation: sway 4s ease-in-out infinite alternate;
        }

        @keyframes sway {
            0% { transform: rotate(calc(var(--base-angle) - 2.5deg)); }
            100% { transform: rotate(calc(var(--base-angle) + 2.5deg)); }
        }

        /* Tallos creciendo */
        .stem {
            width: 5px;
            background: linear-gradient(to top, #081706, #1b3d16, #2d6325);
            border-radius: 4px;
            height: 0;
            filter: drop-shadow(0 0 4px rgba(45, 99, 37, 0.5));
            animation: growStem 2.5s ease-out forwards;
            animation-delay: var(--delay);
        }

        @keyframes growStem {
            100% { height: var(--stem-h); }
        }

        /* El SVG de la flor */
        .flower-svg {
            position: absolute;
            bottom: 100%;
            margin-bottom: -50px; /* MAGIA: Alinea el centro (50,50) exacto con la punta del tallo */
            opacity: 0;
            transform-origin: center center;
            transform: scale(0);
            filter: drop-shadow(0 0 8px rgba(204, 102, 255, 0.6)) drop-shadow(0 0 15px rgba(128, 0, 128, 0.8));
            animation: bloom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: calc(var(--delay) + 1.8s);
        }

        /* Animación de florecer, contrarrestando un poco la rotación del tallo para que miren arriba */
        @keyframes bloom {
            0% { transform: scale(0) rotate(calc(var(--base-angle) * -0.4)); opacity: 0; }
            100% { transform: scale(1) rotate(calc(var(--base-angle) * -0.4)); opacity: 1; }
        }

        /* Estilo de los mensajes */
        .message-bubble {
            position: absolute;
            background: rgba(20, 4, 28, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #da70d6;
            box-shadow: 0 0 12px rgba(218, 112, 214, 0.4);
            color: #f8f0ff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            z-index: 100; /* Asegura que estén por encima de las flores */
            pointer-events: none;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { bottom: -20px; opacity: 0; transform: translateY(0) scale(0.8); }
            10% { opacity: 1; transform: translateY(-30px) scale(1); }
            85% { opacity: 1; }
            100% { bottom: 100vh; opacity: 0; transform: translateY(-50px) scale(0.9); }
        }
    </style>
</head>
<body>

    <div id="messages-container"></div>

    <div class="bouquet-container">
        
        <!-- Flor 1 (Exterior Izquierda) -->
        <div class="flower-wrapper" style="--base-angle: -40deg; --stem-h: 200px; --delay: 0.2s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 85px; height: 85px;"></svg>
        </div>

        <!-- Flor 2 -->
        <div class="flower-wrapper" style="--base-angle: -30deg; --stem-h: 280px; --delay: 0.6s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 110px; height: 110px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <!-- Flor 3 (Rosa Gigante) -->
        <div class="flower-wrapper" style="--base-angle: -18deg; --stem-h: 360px; --delay: 1.0s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 140px; height: 140px;">
                <path d="M50,50 Q30,35 35,65 Q50,55 50,50" fill="#2d5a27"/>
                <path d="M50,50 Q70,35 65,65 Q50,55 50,50" fill="#2d5a27"/>
                <circle cx="50" cy="50" r="25" fill="#3a062e"/>
                <circle cx="43" cy="45" r="20" fill="#661050"/>
                <circle cx="57" cy="45" r="20" fill="#661050"/>
                <circle cx="50" cy="35" r="16" fill="#941374"/>
                <circle cx="50" cy="40" r="10" fill="#c71c9e"/>
            </svg>
        </div>

        <!-- Flor 4 -->
        <div class="flower-wrapper" style="--base-angle: -8deg; --stem-h: 420px; --delay: 0.4s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 110px; height: 110px;"></svg>
        </div>

        <!-- Flor 5 (Lirio Central Alto) -->
        <div class="flower-wrapper" style="--base-angle: 0deg; --stem-h: 470px; --delay: 0.8s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 150px; height: 150px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <!-- Flor 6 (Rosa Central) -->
        <div class="flower-wrapper" style="--base-angle: 8deg; --stem-h: 400px; --delay: 1.2s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 130px; height: 130px;">
                <path d="M50,50 Q30,35 35,65 Q50,55 50,50" fill="#2d5a27"/>
                <path d="M50,50 Q70,35 65,65 Q50,55 50,50" fill="#2d5a27"/>
                <circle cx="50" cy="50" r="26" fill="#4a0e3b"/>
                <circle cx="40" cy="45" r="22" fill="#75155c"/>
                <circle cx="60" cy="45" r="22" fill="#75155c"/>
                <circle cx="50" cy="35" r="18" fill="#a31e81"/>
                <circle cx="50" cy="40" r="12" fill="#d428a8"/>
            </svg>
        </div>

        <!-- Flor 7 -->
        <div class="flower-wrapper" style="--base-angle: 18deg; --stem-h: 330px; --delay: 0.5s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 125px; height: 125px;"></svg>
        </div>

        <!-- Flor 8 -->
        <div class="flower-wrapper" style="--base-angle: 28deg; --stem-h: 260px; --delay: 0.9s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 100px; height: 100px;">
                <g transform="translate(50,50)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#da70d6" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#9932cc" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

        <!-- Flor 9 (Rosa Pequeña Exterior) -->
        <div class="flower-wrapper" style="--base-angle: 38deg; --stem-h: 180px; --delay: 0.3s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 80px; height: 80px;">
                <path d="M50,50 Q30,35 35,65 Q50,55 50,50" fill="#2d5a27"/>
                <path d="M50,50 Q70,35 65,65 Q50,55 50,50" fill="#2d5a27"/>
                <circle cx="50" cy="50" r="22" fill="#3a062e"/>
                <circle cx="43" cy="45" r="18" fill="#661050"/>
                <circle cx="57" cy="45" r="18" fill="#661050"/>
                <circle cx="50" cy="35" r="14" fill="#941374"/>
                <circle cx="50" cy="40" r="8" fill="#c71c9e"/>
            </svg>
        </div>

        <!-- Flor 10 (Relleno medio) -->
        <div class="flower-wrapper" style="--base-angle: -24deg; --stem-h: 240px; --delay: 0.7s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg dahlia-svg" style="width: 75px; height: 75px;"></svg>
        </div>

        <!-- Flor 11 (Relleno derecho) -->
        <div class="flower-wrapper" style="--base-angle: 22deg; --stem-h: 210px; --delay: 1.1s;">
            <div class="stem"></div>
            <svg viewBox="0 0 100 100" class="flower-svg" style="width: 90px; height: 90px;">
                 <g transform="translate(50,50)">
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(0)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(72)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(144)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#e0c3fc" transform="rotate(216)"/>
                    <path d="M0,0 C15,-25 15,-50 0,-60 C-15,-50 -15,-25 0,0" fill="#b978eb" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="6" fill="#ffea00"/>
                </g>
            </svg>
        </div>

    </div>

    <script>
        // Generación de Dalias reescrita para estar centrada exactamente en 50,50
        const dahlias = document.querySelectorAll('.dahlia-svg');
        dahlias.forEach(dahlia => {
            let dahliaHTML = '<g transform="translate(50,50)">';
            for(let i=0; i<16; i++) { dahliaHTML += `<path d="M0,0 L7,-25 L0,-42 L-7,-25 Z" fill="#4a148c" transform="rotate(${i * 22.5})"/>`; }
            for(let i=0; i<12; i++) { dahliaHTML += `<path d="M0,0 L6,-20 L0,-35 L-6,-20 Z" fill="#7b1fa2" transform="rotate(${i * 30 + 15})"/>`; }
            for(let i=0; i<10; i++) { dahliaHTML += `<path d="M0,0 L5,-15 L0,-25 L-5,-15 Z" fill="#ab47bc" transform="rotate(${i * 36})"/>`; }
            for(let i=0; i<8; i++) { dahliaHTML += `<path d="M0,0 L3,-8 L0,-15 L-3,-8 Z" fill="#e1bee7" transform="rotate(${i * 45 + 20})"/>`; }
            dahliaHTML += '<circle cx="0" cy="0" r="5" fill="#ffeb3b"/></g>';
            dahlia.innerHTML = dahliaHTML;
        });

        // Mensajes
        const messages = [
            "¡Felicidades por tu logro! Todo tu esfuerzo rindió frutos.",
            "Eres alguien increíblemente fuerte e inspiradora.",
            "La medicina acaba de ganar a una doctora maravillosa.",
            "Tantas desveladas por fin valieron la pena. ¡Lo lograste!",
            "Con esa bata y tu inteligencia, te ves espectacular.",
            "Admiro tu dedicación, eres una mujer imparable.",
            "Qué orgullo verte alcanzar este sueño.",
            "Eres súper lista, no había duda de que lo ibas a lograr.",
            "Felicidades, doc. Tu pasión es de las cosas que más admiro.",
            "Mucho éxito en todo lo que viene, te lo mereces."
        ];

        const container = document.getElementById('messages-container');

        function spawnMessage() {
            const msgElement = document.createElement('div');
            msgElement.className = 'message-bubble';
            msgElement.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            // Aparecen aleatoriamente entre el lado izquierdo y derecho sin tocar bordes
            const randomX = Math.floor(Math.random() * 70) + 10;
            msgElement.style.left = `${randomX}%`;
            
            const duration = Math.floor(Math.random() * 6) + 12;
            msgElement.style.animationDuration = `${duration}s`;

            container.appendChild(msgElement);

            setTimeout(() => {
                msgElement.remove();
            }, duration * 1000);
        }

        // Comienza a mostrar mensajes después de que crece el ramo
        setTimeout(() => {
            spawnMessage();
            setInterval(spawnMessage, 4500);
        }, 4000);
    </script>
</body>
</html>
